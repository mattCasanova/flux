name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    # macOS runner: matches the primary dev platform and needs no
    # system packages for winit/wgpu to compile. A Linux job can join
    # once the Linux dependency list is pinned down.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
