# Flux Terminal Configuration
#
# Edit this file to customize Flux. Changes take effect on restart.
# (Hot-reload coming in a future release.)
#
# All colors are hex RGB (e.g., "#7aa2f7").

# Config schema version. Bumped when Flux grows a field that older
# defaults can't auto-fill. If you're editing this by hand you almost
# always want the current value — older values are migrated forward
# automatically on load.
version = 1

[font]
# Font family — must be installed on your system.
# Common monospace fonts: "Menlo", "JetBrains Mono", "Fira Code",
# "SauceCodePro Nerd Font Mono", "SF Mono"
family = "Menlo"

# Font size in points (same units as iTerm2 / VS Code).
size = 14.0

# Font weight: "normal" or "bold"
weight = "normal"

# Font style: "normal" or "italic"
style = "normal"

# Line height multiplier. 1.0 = tight, 1.2 = normal, 2.0 = spacious.
# iTerm2's "Vertical Spacing" uses the same multiplier.
line_height = 1.2

[window]
# Window title.
title = "Flux — 1.21 gigawatts"

# Default window size in logical pixels.
width = 1200
height = 800

# Padding in logical pixels between the window edge and the terminal grid.
padding_horizontal = 10
padding_vertical = 10

[theme]
# The complete color theme, spelled out so every knob is visible.
# This is Tokyo Night Storm — change any value to make it yours, or
# delete a key to fall back to the same built-in default.
# (Named theme files in ~/.config/flux/themes/ are a future release;
# that folder is scaffolding for now.)

# Terminal background color.
background = "#24283b"

# Default text (foreground) color.
foreground = "#c0caf5"

# Cursor color. Defaults to foreground when omitted.
cursor = "#c0caf5"

# ANSI colors 0-7.
black   = "#414868"
red     = "#f7768e"
green   = "#73daca"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

# Bright variants (ANSI 8-15).
bright_black   = "#6a7099"
bright_red     = "#ff9999"
bright_green   = "#b9e986"
bright_yellow  = "#f4e070"
bright_blue    = "#9cc1ff"
bright_magenta = "#d6b4ff"
bright_cyan    = "#a3e6ff"
bright_white   = "#e0e6ff"

# Padding color while a full-screen program (vim, Claude Code) runs:
#   "sync"      adopt the program's background (default; vim fills the
#               window edge-to-edge)
#   "theme"     keep the background above, always
#   "#rrggbb"   pin to any fixed color
# alt_screen_background = "sync"

[scrollback]
# Scrollback capacity in lines. 0 disables history entirely.
# Memory cost is roughly proportional (~100 bytes/line-cell row).
lines = 10000

# Padding tint while scrolled up into history — a quiet "not at the
# live tail" cue. Any hex color; leave unset for no change.
# scrolled_background = "#2a2f45"
